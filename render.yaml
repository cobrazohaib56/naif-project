services:
  - type: web
    name: naif-backend
    plan: free 
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: HUGGINGFACE_EMBEDDING_MODEL
        value: "sentence-transformers/all-MiniLM-L6-v2"
      - key: HUGGINGFACE_LLM_MODEL
        value: "mistralai/Mistral-7B-Instruct-v0.2"

  - type: web
    name: naif-frontend
    plan: free 
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false